<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200">
    <section class="mb-10">
        <div class="flex bg-white w-full shadow-sm justify-between p-6">
            <div class="flex justify-center items-center gap-3">
                <div>
                    <img src="./assets/github-logo.png" alt="">
                </div>
                <div>
                    <h2 class="font-bold text-4xl">GitHub Issues Tracker</h2>
                </div>
            </div>
            <div class="flex justify-center items-center gap-4">
                <div>
                    <input class="class=w-[456px] h-8  p-6 border-gray-200 mb-2 shadow" type="text" placeholder="Search issues..">
                </div>
                <div>
                    <button class="bg-[#4A00FF] p-3 text-white rounded-md">New Issue</button>
                </div>
            </div>
        </div>
    </section>

    <section class="w-[80%] flex  p-3 bg-white mx-auto gap-2.5">
        <div>
            <button class="px-2 py-1.5 w-[120px] h-10 shadow-md bg-[#4A00FF] text-white
            rounded-md">All</button>
        </div>
        <div>
            <button class="px-2 py-1.5 w-[120px] h-10 shadow-md bg-white
            rounded-md">Open</button>
        </div>
        <div>
            <button class="px-2 py-1.5 w-[120px] h-10 shadow-md bg-white
            rounded-md">Closed</button>
            
        </div>
    </section>
        
        
    
    
</body>
</html>
