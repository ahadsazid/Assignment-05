<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-5</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />


<link rel="stylesheet" href="./style/style.css">
</head>
<body>
    <section class="bg-gray-200 flex justify-center items-center">
        <div class="bg-white w-[520px] h-[743px] m-10 p-8 rounded-lg" >
            <div class="flex justify-center mb-4">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h2 class="text-2xl text-center font-bold">GitHub Issues Tracker</h2>
            <p class="text-center text-gray-500 mb-4">Sign in to manage your issues</p>
            <div>
                <h2 class="font-medium mb-2">Username</h2>
                <input id="username" class="w-[456px] h-8 rounded-md p-4 border-gray-200 mb-2 shadow" type="text" placeholder="Enter Username">
                <p class="text-[#4A00FF] text-sm mb-2">Default: admin</p>

            </div>
            <div>
                <h2 class="font-medium mb-2">Password</h2>
                <input id="password" class="w-[456px] h-8 rounded-md p-4 border-gray-200 mb-2 shadow" type="text" placeholder="Enter Password">
                <p class="text-[#4A00FF] text-sm mb-4">Default: admin123</p>

            </div>
            <button  id="sign-in" class="text-center bg-[#4A00FF] text-white w-full rounded-lg p-4 mb-5 cursor-pointer hover:bg-[#4A00FF]">Sign In </button>
            <div class="flex items-center mb-4">
                <hr class="grow border-gray-300">
                <span class="mx-3 text-gray-700">OR</span>
                <hr class="grow border-gray-300">
            </div>
            <p class="text-sm text-gray-500 text-center mb-2">Demo Credentials:</p>
            <div class="text-center p-4 rounded-lg bg-gray-100">
                <p>Username: admin</p>
                <p>Password: admin123</p>
                
            </div>

        </div>

    </section>
    <script src="script.js"></script>

    
</body>
</html>
